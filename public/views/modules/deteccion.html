<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extraccion de keywords</title>

  <!-- Bootstrap CDN-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

  <!-- Bootstrap  ICONS-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="bg-light">
  <main class="container d-flex gap-4 justify-content-center">
    <button class="btn btn-sm btn-primary position-fixed top-0 start-0 m-3" onclick="window.history.back()">
      <i class="bi bi-arrow-left"></i>
      Atras
    </button>
    <div class="d-flex flex-column my-5 w-75 gap-3">
      <div class="containter-box1 shadow">
        <div class="card px-3">
          <div class="card-body">
            <h5 class="card-title fw-light">Datos de entrada</h5>
            <div class="shadow w-100 border my-2"></div>
            <form method="get" id="form-text">
              <div class="form-floating">
                <input type="text" class="form-control" required />
                <label for="text-input">URL de la imagen:</label>
              </div>
              <div class="text-end my-3">
                <button type="submit" class="btn btn-primary" id="btnEnviar" form="form-text">
                  Enviar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="containter-box2 shadow">
        <div class="card px-3">
          <div class="card-body">
            <h5 class="card-title fw-light">Salida de datos</h5>
            <!-- Linea de separacion -->
            <div class="shadow w-100 border my-2 mb-4"></div>

            <!-- Container de los resultados filtrados -->
            <div class="container-results d-flex flex-wrap gap-2 flex-row justify-content-center">
              <div class="text-center container-img">
                <img
                  src="https://thumbs.dreamstime.com/b/ordenador-del-uso-hombre-de-negocios-la-mano-en-tabla-escritorio-oficina-con-c%C3%A1lculo-100481769.jpg"
                  class="img-fluid" alt="Imagen de ejemplo" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
  <!--  -->
  <script src="/src/extraccion.js"></script>
</body>

</html>
