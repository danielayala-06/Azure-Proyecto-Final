<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extraccion de keywords</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <main class="container d-flex gap-4">
        <div class="d-flex flex-column my-5 w-75 gap-5">
            <div class="containter-box1 shadow">
                <div class="card px-3">
                    <div class="card-body">
                        <h5 class="card-title fw-light">Datos de entrada</h5>
                        <div class="shadow w-100 border my-2"></div>
                        <form method="get" id="form-text">
                            <label for="text-input" class="form-label">Texto:</label>
                            <div class="">
                                <input type="text" class="form-control" name="" id="text-input" required
                                    style="height: 8rem;">
                            </div>
                            <div class="text-end my-3">
                                <input type="submit" class="btn btn-primary" value="Enviar">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="containter-box2 shadow">
                <div class="card px-3">
                    <div class="card-body">
                        <h5 class="card-title fw-light">Salida de datos:</h5>
                        <!-- Datos cargados de forma async desde JS -->
                        <div class="shadow w-100 border my-2"></div>
                        <div class="container-results d-flex flex-wrap gap-2 flex-row">
                            <!-- Container de los resultados filtrados -->

                            <!-- CARDS -->
                            <div class="card border-primary" style="width: 13rem;">
                                <div class="card-body">
                                    <h5 class="card-title fs-5">Category</h5>
                                    <p class="card-text">Algunas palabras mas que no c dx</p>
                                </div>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item">Confidence: </li>
                                </ul>
                            </div>

                            <!-- -->

                            <!-- CARDS -->
                            <div class="card" style="width: 13rem;">
                                <div class="card-body">
                                    <h5 class="card-title fs-5">Category</h5>
                                    <p class="card-text">Algunas palabras mas que no c dx</p>
                                </div>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item">Confidence: </li>
                                </ul>
                            </div>

                            <!-- CARDS -->
                            <div class="card" style="width: 13rem;">
                                <div class="card-body">
                                    <h5 class="card-title fs-5">Category</h5>
                                    <p class="card-text">Algunas palabras mas que no c dx</p>
                                </div>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item">Confidence: </li>
                                </ul>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
        <aside class="w-25">
            <div class="container-aside my-5 bg-white py-2 px-3 border rounded-1 shadow">
                <div class="filter-option w-100">
                    <div class="text-center">
                        <h5 class="fw-light mt-2">Analizar</h5>
                        <div class="shadow w-100 border my-2"></div>
                    </div>
                    <div class="checkbox-section">

                        <!--  -->
                        <div class="mb-1 form-check">
                            <input type="checkbox" class="form-check-input" id="Product" value="Product">
                            <label class="form-check-label" for="Product">Product</label>
                        </div>


                        <!--  -->
                        <div class="mb-1 form-check">
                            <input type="checkbox" class="form-check-input" id="PhoneNumber" value="PhoneNumber">
                            <label class="form-check-label" for="PhoneNumber">PhoneNumber</label>
                        </div>

                        <!--  -->
                        <div class="mb-1 form-check">
                            <input type="checkbox" class="form-check-input" id="DateTime" value="DateTime">
                            <label class="form-check-label" for="DateTime">DateTime</label>
                        </div>


                        <!--  -->
                        <div class="mb-1 form-check">
                            <input type="checkbox" class="form-check-input" id="Organization" value="Organization">
                            <label class="form-check-label" for="Organization">Organization</label>

                        </div>

                        <!--  -->
                        <div class="mb-1 form-check">
                            <input type="checkbox" class="form-check-input" id="Person" value="PersonType">
                            <label class="form-check-label" for="Person">Person</label>
                        </div>

                        <!--  -->
                        <div class="mb-2 form-check">
                            <input type="checkbox" class="form-check-input" id="Location" value="Location">
                            <label class="form-check-label" for="Location">Location</label>
                        </div>

                    </div>
                </div>
            </div>
        </aside>
    </main>
    <footer>

    </footer>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <!--  -->
    <script src="/src/extraccion.js"></script>
</body>

</html>
